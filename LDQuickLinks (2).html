<!DOCTYPE html>

<head>

<title>Propelr: Resources</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:transparent;font-family:'Inter',sans-serif;color:#1a1a2e;padding:.5rem}

.resource-row{display:flex;flex-wrap:wrap;gap:10px}
.resource-pill{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  background:linear-gradient(to bottom,#ffffff 0%,#E8EDF8 100%);
  border:1px solid #A6B3D5;
  border-radius:18px;
  padding:.75rem 1.3rem;
  text-decoration:none;
  transition:box-shadow .15s,transform .15s;
}
.resource-pill:hover{box-shadow:0 3px 10px rgba(93,112,174,.15);transform:translateY(-1px)}
.resource-icon{
  width:32px;height:32px;flex-shrink:0;
  border:1px solid #59A398;
  border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  background:#ffffff;
}
.resource-icon svg{
  width:18px;height:18px;
  stroke:#59A398;stroke-width:1.8;fill:none;
  stroke-linecap:round;stroke-linejoin:round;
}
.resource-pill span:not(.resource-icon){
  font-family:'Inter',sans-serif;
  font-weight:600;
  font-size:15px;
  line-height:1;
  color:#1B2F5B;
  white-space:nowrap;
}

@media (max-width:520px){
  .resource-row{flex-wrap:wrap}
}
</style>
</head>
