<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Propelr: Launchpad Library</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:transparent;font-family:'Inter',sans-serif;color:#1a1a2e;padding:.5rem}

.psub{font-size:13px;color:#666;margin-bottom:18px;line-height:1.5}

.cat-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cat-label{font-family:'Inter',sans-serif;font-weight:700;font-size:14px;color:#1B2F5B}
.cat-clear{
  background:none;border:none;font-family:'Inter',sans-serif;font-size:12.5px;font-weight:600;
  color:#999;cursor:pointer;transition:color .15s;
}
.cat-clear:hover{color:#5D70AE}

.lib-wrap{display:grid;grid-template-columns:250px 1fr;gap:18px}
@media (max-width:560px){.lib-wrap{grid-template-columns:1fr}}

.cat-list{display:flex;flex-direction:column;gap:10px}
.cat-pill{
  display:block;width:100%;text-align:left;
  background:linear-gradient(135deg,#E8EDF8 0%,#DAF3EF 100%);
  border:none;border-radius:14px;
  padding:.85rem 1.1rem;
  font-family:'Inter',sans-serif;font-weight:600;font-size:13.5px;color:#59A398;
  cursor:pointer;transition:box-shadow .15s,transform .15s;
}
.cat-pill:hover{box-shadow:0 3px 10px rgba(93,112,174,.15);transform:translateY(-1px)}
.cat-pill.active{background:#5D70AE;color:#fff}

.results{border-left:1px solid #d8dce8;padding-left:18px;max-height:340px;overflow-y:auto}
@media (max-width:560px){.results{border-left:none;border-top:1px solid #d8dce8;padding-left:0;padding-top:16px}}
.results-empty{font-size:13px;color:#666;line-height:1.6}
.post-list{display:flex;flex-direction:column;gap:2px}
.post-link{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:.7rem .25rem;text-decoration:none;color:#1B2F5B;font-size:13.5px;font-weight:600;
  border-bottom:1px solid #eef0f7;transition:color .15s;
}
.post-list a.post-link:last-child{border-bottom:none}
.post-link:hover{color:#59A398}
.post-link svg{flex-shrink:0;width:14px;height:14px;stroke:#5D70AE;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;transition:stroke .15s}
.post-link:hover svg{stroke:#59A398}
</style>
</head>
<body>

<p class="psub">Articles from the Propelr website on sales strategy, payments education, and company news. Great reading for training or for sharing with prospects.</p>

<div class="cat-head">
  <span class="cat-label">Categories</span>
  <button type="button" class="cat-clear" onclick="clearCategory()">Clear</button>
</div>

<div class="lib-wrap">
  <div class="cat-list" id="cat-list"></div>
  <div class="results" id="results">
    <p class="results-empty">Select a category to view articles.</p>
  </div>
</div>

<script>
var categories = {
  "Reseller Partnerships": [
    { title: "The Modern Approach to Marketing for Payment Sales Agents", url: "https://www.propelrpay.com/blog/the-modern-approach-to-marketing-for-payment-sales-agents" },
    { title: "How Choosing the Right Payments Partner Can Catapult Your Success", url: "https://www.propelrpay.com/blog/how-choosing-the-right-payments-partner-can-catapult-your-success" },
    { title: "7 Things Sales Agents Need in a Payments Partner", url: "https://www.propelrpay.com/blog/7-things-sales-agents-need-in-a-payments-partner" }
  ],
  "Integrated Payments": [
    { title: "The Role of Strategic Marketing in Integrated Payment Processing", url: "https://www.propelrpay.com/blog/the-role-of-strategic-marketing-in-integrated-payment-processing" },
    { title: "Break Free From Your ERP's Expensive Default Payments Processor", url: "https://www.propelrpay.com/blog/break-free-from-your-erps-expensive-default-payments-processor" },
    { title: "How Integrated Payments Can Drive Business", url: "https://www.propelrpay.com/blog/how-integrated-payments-can-drive-business" }
  ],
  "Company News": [
    { title: "Propelr Launches 3am ET Cutoff for Next-Day Funding: A Game-Changer for Cash Flow", url: "https://www.propelrpay.com/blog/3am" },
    { title: "How Propelr, FreedomPay, and DRIVE Are Redefining Payments for Automotive Shops", url: "https://www.propelrpay.com/blog/drivepay" },
    { title: "Full Throttle into 2026: How Propelr Is Redefining the Merchant Experience", url: "https://www.propelrpay.com/blog/wholesale" },
    { title: "Propelr Expands with New Dallas Office", url: "https://www.propelrpay.com/blog/propelr-expands-with-new-dallas-office" },
    { title: "Woodforest Acceptance Solutions and Propelr Announce Partnership", url: "https://www.propelrpay.com/blog/woodforest-acceptance-solutions-and-propelr-announce-partnership" },
    { title: "Propelr Acquires Ireland Pay", url: "https://www.propelrpay.com/blog/propelr-acquires-ireland-pay" }
  ],
  "Payment Security": [
    { title: "Protecting Payment Data: What Recent Breaches Teach Us", url: "https://www.propelrpay.com/blog/protecting-payment-data-what-recent-breaches-teach-us" },
    { title: "7 Real-World Data Breaches", url: "https://www.propelrpay.com/blog/7-real-world-data-breaches" },
    { title: "Integrated vs. Non-Integrated Payments", url: "https://www.propelrpay.com/blog/integrated-vs-non-integrated-payments" }
  ],
  "Payments Education": [
    { title: "Visa Commercial Enhanced Data Program (CEDP): Your First Class, All Access Pass", url: "https://www.propelrpay.com/blog/cedp" },
    { title: "Everything You Need to Know About PCI Compliance", url: "https://www.propelrpay.com/blog/everything-you-need-to-know-about-pci-compliance" },
    { title: "The New Wave of Payments: What Customers Want and Why It Is Good for Business", url: "https://www.propelrpay.com/blog/the-new-wave-of-payments-what-customers-want-and-why-its-good-for-business" },
    { title: "The Top 10 Reasons Your Business Needs to Accept Electronic Payments", url: "https://www.propelrpay.com/blog/the-top-10-reasons-your-business-needs-to-accept-electronic-payments" },
    { title: "Payment Processing 101", url: "https://www.propelrpay.com/blog/payment-processing-101" }
  ]
};

var activeCategory = null;

function renderCategories(){
  var list = document.getElementById('cat-list');
  var html = "";
  for (var name in categories) {
    var cls = "cat-pill" + (name === activeCategory ? " active" : "");
    html += '<button type="button" class="' + cls + '" onclick="selectCategory(\'' + name.replace(/'/g,"\\'") + '\')">' + name + '</button>';
  }
  list.innerHTML = html;
}

function renderResults(){
  var el = document.getElementById('results');
  if (!activeCategory) {
    el.innerHTML = '<p class="results-empty">Select a category to view articles.</p>';
    return;
  }
  var posts = categories[activeCategory];
  var html = '<div class="post-list">';
  for (var i = 0; i < posts.length; i++) {
    html += '<a class="post-link" href="' + posts[i].url + '" target="_blank" rel="noopener"><span>' + posts[i].title + '</span><svg viewBox="0 0 24 24"><path d="M7 17L17 7"/><path d="M9 7h8v8"/></svg></a>';
  }
  html += '</div>';
  el.innerHTML = html;
}

function selectCategory(name){
  activeCategory = (activeCategory === name) ? null : name;
  renderCategories();
  renderResults();
}

function clearCategory(){
  activeCategory = null;
  renderCategories();
  renderResults();
}

renderCategories();
renderResults();
</script>
</body>
</html>
