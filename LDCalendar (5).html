<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Propelr: Training Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:transparent;font-family:'Inter',sans-serif;color:#1a1a2e;padding:0}

.cal-wrap{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media (max-width:640px){.cal-wrap{grid-template-columns:1fr}}

/* ===== Calendar ===== */
.cal-card{background:linear-gradient(to bottom,#ffffff 0%,#E8EDF8 100%);border:1px solid #A6B3D5;border-radius:9px;padding:1rem 1.1rem;height:520px;display:flex;flex-direction:column;justify-content:center;overflow:hidden}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem}
.cal-month{font-family:'Inter',sans-serif;font-weight:700;font-size:16px;color:#1B2F5B}
.cal-arrow{
  width:28px;height:28px;border-radius:50%;border:1px solid #A6B3D5;background:#fff;
  display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,border-color .15s;
}
.cal-arrow:hover{background:#59A398;border-color:#59A398}
.cal-arrow:hover svg{stroke:#fff}
.cal-arrow svg{width:15px;height:15px;stroke:#5D70AE;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;transition:stroke .15s}

.cal-grid{display:grid;grid-template-columns:repeat(7,44px);gap:6px;justify-content:center}
.cal-dow{font-size:11.5px;font-weight:700;text-transform:uppercase;color:#888;text-align:center;padding:2px 0}
.cal-day{
  position:relative;width:44px;height:44px;display:flex;align-items:center;justify-content:center;
  font-size:16px;color:#444;border-radius:6px;border:1px solid transparent;background:none;
  font-family:'Inter',sans-serif;cursor:default;transition:background .15s,border-color .15s,color .15s;
}
.cal-day.blank{visibility:hidden}
.cal-day.has-event{cursor:pointer;color:#1B2F5B;font-weight:700}
.cal-day.has-event:hover{background:#DAF3EF;border-radius:50%}
.cal-day.selected{background:#59A398;color:#fff;border-radius:50%}
.cal-day .dot{position:absolute;bottom:3px;width:5px;height:5px;border-radius:50%;background:#59A398}
.cal-day.selected .dot{background:#fff}

/* ===== Detail panel ===== */
.detail-card{background:linear-gradient(to bottom,#ffffff 0%,#E8EDF8 100%);border:1px solid #A6B3D5;border-radius:9px;padding:1.2rem 1.3rem;height:520px;display:flex;flex-direction:column}
.detail-empty{font-size:14px;color:#666;line-height:1.6;margin:auto 0}
.detail-title{font-family:'Inter',sans-serif;font-weight:700;font-size:17px;color:#1B2F5B;margin-bottom:8px;text-wrap:balance;flex-shrink:0}
.detail-meta{display:flex;align-items:center;gap:6px;font-size:13px;color:#59A398;font-weight:600;margin-bottom:12px;flex-shrink:0}
.detail-meta svg{width:14px;height:14px;stroke:#59A398;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.detail-desc{font-size:13px;color:#444;line-height:1.55;margin-bottom:12px;max-height:300px;overflow-y:auto;padding-right:4px;flex-shrink:0}
.detail-desc p{margin-bottom:9px}
.detail-desc ul{margin:0 0 9px 18px}
.detail-desc li{margin-bottom:4px}
.detail-note{font-size:13px;color:#59A398;font-weight:700;line-height:1.5;margin-bottom:10px;flex-shrink:0}
.detail-actions{display:flex;flex-wrap:wrap;gap:9px;flex-shrink:0}
.detail-btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  background:#5D70AE;color:#fff;border-radius:7px;padding:.65rem 1.05rem;text-decoration:none;
  font-family:'Inter',sans-serif;font-size:13px;font-weight:700;transition:background .15s;
  cursor:pointer;border:none;
}
.detail-btn:hover{background:#59A398}
</style>
</head>
<body>

<div class="cal-wrap">
  <div class="cal-card">
    <div class="cal-nav">
      <span class="cal-arrow" onclick="shiftMonth(-1)">
        <svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7"/></svg>
      </span>
      <span class="cal-month" id="cal-month-label"></span>
      <span class="cal-arrow" onclick="shiftMonth(1)">
        <svg viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
      </span>
    </div>
    <div class="cal-grid" id="cal-dow"></div>
    <div class="cal-grid" id="cal-grid" style="margin-top:4px"></div>
  </div>

  <div class="detail-card" id="detail-card">
    <p class="detail-empty">Select a highlighted date to view session details and register.</p>
  </div>
</div>

<script>

    link: "https://events.teams.microsoft.com/event/0c821bcc-32e6-4617-96e5-1885f63e9074@db4bb98e-b39f-4bfd-b3e3-e0b809d1bb6a",
    mailto: "mailto:blush@propelrpay.com?subject=Learning%20Lift-Off%20Topic%20Idea",
    description: [
      "Every member of the Prop plane is invested in your growth and is committed to creating ongoing learning opportunities that provide the tools and resources you need to win new business and deliver even more value to your existing clients.",
      "That is why we are excited to invite you to our monthly Learning Lift-Off webinar series, where we take a deep dive into a new topic designed to sharpen your expertise and expand your selling power.",
      "Topic to be announced soon. Have an idea for what we should cover? Send it our way."
    ]
  }
};

var viewYear = 2026;
var viewMonth = 6;
var selectedKey = null;

var dowNames = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
var monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];

function pad(n){ return n < 10 ? "0" + n : "" + n; }
function keyFor(y,m,d){ return y + "-" + pad(m+1) + "-" + pad(d); }

function formatDate(key){
  var parts = key.split("-");
  var y = parseInt(parts[0], 10);
  var m = parseInt(parts[1], 10) - 1;
  var d = parseInt(parts[2], 10);
  return monthNames[m] + " " + d + ", " + y;
}

function renderDow(){
  var el = document.getElementById('cal-dow');
  var html = "";
  for (var i = 0; i < 7; i++) html += '<div class="cal-dow">' + dowNames[i] + '</div>';
  el.innerHTML = html;
}

function renderCalendar(){
  document.getElementById('cal-month-label').textContent = monthNames[viewMonth] + " " + viewYear;
  var firstDow = new Date(viewYear, viewMonth, 1).getDay();
  var daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  var grid = document.getElementById('cal-grid');
  var html = "";

  for (var b = 0; b < firstDow; b++) html += '<div class="cal-day blank"></div>';

  for (var d = 1; d <= daysInMonth; d++) {
    var key = keyFor(viewYear, viewMonth, d);
    var hasEvent = events.hasOwnProperty(key);
    var cls = "cal-day" + (hasEvent ? " has-event" : "") + (key === selectedKey ? " selected" : "");
    var dot = hasEvent ? '<span class="dot"></span>' : "";
    var click = hasEvent ? ' onclick="selectDate(\'' + key + '\')"' : "";
    html += '<div class="' + cls + '"' + click + '>' + d + dot + '</div>';
  }

  grid.innerHTML = html;
}

function selectDate(key){
  selectedKey = key;
  renderCalendar();
  renderDetail(key);
}

function renderDetail(key){
  var ev = events[key];
  var card = document.getElementById('detail-card');
  if (!ev) {
    card.innerHTML = '<p class="detail-empty">Select a highlighted date to view session details and register.</p>';
    return;
  }
  var descHtml = "";
  for (var i = 0; i < ev.description.length; i++) {
    var block = ev.description[i];
    if (block.indexOf("list:") === 0) {
      var items = block.substring(5).split("|");
      descHtml += "<ul>";
      for (var j = 0; j < items.length; j++) descHtml += "<li>" + items[j] + "</li>";
      descHtml += "</ul>";
    } else {
      descHtml += "<p>" + block + "</p>";
    }
  }

  var metaHtml = '<p class="detail-meta"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>' + (ev.past ? formatDate(key) : ev.time) + '</p>';

  var noteHtml = "";
  var actionsHtml = '<div class="detail-actions">';
  if (ev.past) {
    actionsHtml += '<a class="detail-btn" href="' + ev.recordingLink + '" target="_blank" rel="noopener">View Recording</a>';
  } else if (ev.autoRegistered) {
    noteHtml = '<p class="detail-note">You are already registered for this session. Do not see it on your calendar? Email Beth below.</p>';
    actionsHtml += '<a class="detail-btn" href="mailto:blush@propelrpay.com?subject=Missing%20Calendar%20Invite%20-%20' + encodeURIComponent(ev.title) + '">Email Beth</a>';
  } else {
    actionsHtml += '<a class="detail-btn" href="' + ev.link + '" target="_blank" rel="noopener">Register</a>';
    if (ev.mailto) {
      actionsHtml += '<a class="detail-btn" href="' + ev.mailto + '">Email a topic idea</a>';
    }
  }
  actionsHtml += '</div>';

  card.innerHTML =
    '<p class="detail-title">' + ev.title + '</p>' +
    metaHtml +
    '<div class="detail-desc">' + descHtml + '</div>' +
    noteHtml +
    actionsHtml;
}

function shiftMonth(dir){
  viewMonth += dir;
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  renderCalendar();
  renderDetail(selectedKey);
}

renderDow();
renderCalendar();
</script>
</body>
</html>
