<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Propelr: Training Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:transparent;font-family:'Inter',sans-serif;color:#1a1a2e;padding:.5rem}

.outer{
  border:1px solid #d8dce8;
  border-radius:8px;
  overflow:hidden;
  background:linear-gradient(to bottom,#ffffff 0%,#e8edf8 100%);
}
.panel{padding:16px 18px}

.eyebrow{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#59A398;margin-bottom:5px}
.ptitle{font-family:'Inter',sans-serif;font-weight:700;font-size:19px;color:#1B2F5B;margin-bottom:14px}

.cal-wrap{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media (max-width:640px){.cal-wrap{grid-template-columns:1fr}}

/* ===== Calendar ===== */
.cal-card{background:linear-gradient(to bottom,#ffffff 0%,#E8EDF8 100%);border:1px solid #A6B3D5;border-radius:9px;padding:.9rem 1rem;display:flex;flex-direction:column}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:.7rem}
.cal-month{font-family:'Inter',sans-serif;font-weight:700;font-size:14.5px;color:#1B2F5B}
.cal-arrow{
  width:24px;height:24px;border-radius:50%;border:1px solid #A6B3D5;background:#fff;
  display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,border-color .15s;
}
.cal-arrow:hover{background:#59A398;border-color:#59A398}
.cal-arrow:hover svg{stroke:#fff}
.cal-arrow svg{width:13px;height:13px;stroke:#5D70AE;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;transition:stroke .15s}

.cal-grid{display:grid;grid-template-columns:repeat(7,34px);gap:5px;justify-content:center}
.cal-dow{font-size:10.5px;font-weight:700;text-transform:uppercase;color:#888;text-align:center;padding:2px 0}
.cal-day{
  position:relative;width:34px;height:34px;display:flex;align-items:center;justify-content:center;
  font-size:13.5px;color:#444;border-radius:6px;border:1px solid transparent;background:none;
  font-family:'Inter',sans-serif;cursor:default;transition:background .15s,border-color .15s,color .15s;
}
.cal-day.blank{visibility:hidden}
.cal-day.has-event{cursor:pointer;color:#1B2F5B;font-weight:700}
.cal-day.has-event:hover{background:#DAF3EF;border-radius:50%}
.cal-day.selected{background:#59A398;color:#fff;border-radius:50%}
.cal-day .dot{position:absolute;bottom:2px;width:5px;height:5px;border-radius:50%;background:#59A398}
.cal-day.selected .dot{background:#fff}

/* ===== Detail panel ===== */
.detail-card{background:linear-gradient(to bottom,#ffffff 0%,#E8EDF8 100%);border:1px solid #A6B3D5;border-radius:9px;padding:1.1rem 1.2rem;display:flex;flex-direction:column}
.detail-empty{font-size:14px;color:#666;line-height:1.6;margin:auto 0}
.detail-title{font-family:'Inter',sans-serif;font-weight:700;font-size:16.5px;color:#1B2F5B;margin-bottom:8px;text-wrap:balance}
.detail-meta{display:flex;align-items:center;gap:6px;font-size:13px;color:#59A398;font-weight:600;margin-bottom:11px}
.detail-meta svg{width:14px;height:14px;stroke:#59A398;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.detail-desc{font-size:13px;color:#444;line-height:1.6;margin-bottom:12px}
.detail-desc p{margin-bottom:9px}
.detail-desc ul{margin:0 0 9px 18px}
.detail-desc li{margin-bottom:4px}
.detail-actions{display:flex;flex-wrap:wrap;gap:9px;margin-top:auto}
.detail-btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  background:#5D70AE;color:#fff;border-radius:7px;padding:.65rem 1.05rem;text-decoration:none;
  font-family:'Inter',sans-serif;font-size:13px;font-weight:700;transition:background .15s;
  cursor:pointer;border:none;
}
.detail-btn:hover{background:#59A398}
.detail-btn.ghost{
  background:none;color:#5D70AE;border:1.5px solid #5D70AE;
}
.detail-btn.ghost:hover{background:#59A398;border-color:#59A398;color:#fff}
</style>
</head>
<body>

<div class="outer">
  <div class="panel">
    <p class="eyebrow">Learning Lift-Off</p>
    <p class="ptitle">Training Calendar</p>

    <div class="cal-wrap">
      <div class="cal-card">
        <div class="cal-nav">
          <span class="cal-arrow" onclick="shiftMonth(-1)">
            <svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7"/></svg>
          </span>
          <span class="cal-month" id="cal-month-label"></span>
          <span class="cal-arrow" onclick="shiftMonth(1)">
            <svg viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
          </span>
        </div>
        <div class="cal-grid" id="cal-dow"></div>
        <div class="cal-grid" id="cal-grid" style="margin-top:4px"></div>
      </div>

      <div class="detail-card" id="detail-card">
        <p class="detail-empty">Select a highlighted date to view session details and register.</p>
      </div>
    </div>

  </div>
</div>

<script>
var recordingsLink = "https://propelrpay1.sharepoint.com/sites/Training/SitePages/Leaning%20Lift-Off.aspx";

var events = {
  "2026-02-06": {
    title: "Flight School: Fiserv Wholesale",
    past: true,
    recordingLink: "https://propelrpay1.sharepoint.com/sites/Employee-Portal/SitePages/Flight-School.aspx",
    description: [
      "We are sorry you missed this Flight School session. You can find the recording here."
    ]
  },
  "2026-03-17": {
    title: "Learning Lift-Off: Valor PayTech Deep Dive",
    past: true,
    recordingLink: recordingsLink,
    description: [
      "We are sorry you missed this month's Learning Lift-Off. You can find the session recording here."
    ]
  },
  "2026-04-21": {
    title: "Learning Lift-Off: Valor PayTech Hardware",
    past: true,
    recordingLink: recordingsLink,
    description: [
      "We are sorry you missed this month's Learning Lift-Off. You can find the session recording here."
    ]
  },
  "2026-05-28": {
    title: "Learning Lift-Off: ISV & Referral Partnerships",
    past: true,
    recordingLink: recordingsLink,
    description: [
      "We are sorry you missed this month's Learning Lift-Off. You can find the session recording here."
    ]
  },
  "2026-06-16": {
    title: "Learning Lift-Off: Stratus Onboarding",
    past: true,
    recordingLink: recordingsLink,
    description: [
      "We are sorry you missed this month's Learning Lift-Off. You can find the session recording here."
    ]
  },
  "2026-07-14": {
    title: "Learning Lift-Off: Equipment Financing",
    time: "3:00 PM ET",
    link: "https://events.teams.microsoft.com/event/a905c646-974b-49bc-a4c9-b4eaf0b9b1c5@db4bb98e-b39f-4bfd-b3e3-e0b809d1bb6a",
    startUTC: "20260714T190000Z",
    endUTC: "20260714T200000Z",
    description: [
      "Equipment financing is one of the most powerful tools in your sales toolkit, and one of the easiest to get wrong if you do not know the rules. Propelr offers seven different financing structures, and this session is your guided walkthrough of all of them.",
      "list:Which option fits the deal in front of you, and how to pitch it|What your liability actually looks like under each structure, it varies more than you would expect|What documentation is required before equipment ever ships|How the CFO approval process works for pilot facing financing options|What is new with equipment onboarding in Stratus, and where to go for the full details",
      "This session is designed to get you oriented. The Employee Portal has the full reference material, and we will point you to exactly where to find it."
    ]
  },
  "2026-08-18": {
    title: "Learning Lift-Off: Topic TBD",
    time: "3:00 PM ET",
    link: "https://events.teams.microsoft.com/event/d5326753-8455-4e4e-8a9d-97694c16b280@db4bb98e-b39f-4bfd-b3e3-e0b809d1bb6a",
    mailto: "mailto:blush@propelrpay.com?subject=Learning%20Lift-Off%20Topic%20Idea",
    startUTC: "20260818T190000Z",
    endUTC: "20260818T200000Z",
    description: [
      "Every member of the Prop plane is invested in your growth and is committed to creating ongoing learning opportunities that provide the tools and resources you need to win new business and deliver even more value to your existing clients.",
      "That is why we are excited to invite you to our monthly Learning Lift-Off webinar series, where we take a deep dive into a new topic designed to sharpen your expertise and expand your selling power.",
      "Topic to be announced soon. Have an idea for what we should cover? Send it our way."
    ]
  }
};

var viewYear = 2026;
var viewMonth = 6;
var selectedKey = null;

var dowNames = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
var monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];

function pad(n){ return n < 10 ? "0" + n : "" + n; }
function keyFor(y,m,d){ return y + "-" + pad(m+1) + "-" + pad(d); }

function formatDate(key){
  var parts = key.split("-");
  var y = parseInt(parts[0], 10);
  var m = parseInt(parts[1], 10) - 1;
  var d = parseInt(parts[2], 10);
  return monthNames[m] + " " + d + ", " + y;
}

function escapeICS(text){
  return text.replace(/\\/g,"\\\\").replace(/,/g,"\\,").replace(/;/g,"\\;").replace(/\n/g,"\\n");
}

function downloadICS(key){
  var ev = events[key];
  if (!ev || !ev.startUTC) return;
  var stamp = new Date().toISOString().replace(/[-:]/g,"").split(".")[0] + "Z";
  var plainDesc = ev.description.filter(function(b){ return b.indexOf("list:") !== 0; }).join(" ");
  var lines = [
    "BEGIN:VCALENDAR",
    "VERSION:2.0",
    "PRODID:-//Propelr//Learning Lift-Off//EN",
    "BEGIN:VEVENT",
    "UID:" + key + "@propelrpay.com",
    "DTSTAMP:" + stamp,
    "DTSTART:" + ev.startUTC,
    "DTEND:" + ev.endUTC,
    "SUMMARY:" + escapeICS(ev.title),
    "DESCRIPTION:" + escapeICS(plainDesc),
    "LOCATION:Microsoft Teams",
    "URL:" + ev.link,
    "END:VEVENT",
    "END:VCALENDAR"
  ];
  var blob = new Blob([lines.join("\r\n")], {type:"text/calendar"});
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url;
  a.download = ev.title.replace(/[^a-z0-9]/gi,"_") + ".ics";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function renderDow(){
  var el = document.getElementById('cal-dow');
  var html = "";
  for (var i = 0; i < 7; i++) html += '<div class="cal-dow">' + dowNames[i] + '</div>';
  el.innerHTML = html;
}

function renderCalendar(){
  document.getElementById('cal-month-label').textContent = monthNames[viewMonth] + " " + viewYear;
  var firstDow = new Date(viewYear, viewMonth, 1).getDay();
  var daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  var grid = document.getElementById('cal-grid');
  var html = "";

  for (var b = 0; b < firstDow; b++) html += '<div class="cal-day blank"></div>';

  for (var d = 1; d <= daysInMonth; d++) {
    var key = keyFor(viewYear, viewMonth, d);
    var hasEvent = events.hasOwnProperty(key);
    var cls = "cal-day" + (hasEvent ? " has-event" : "") + (key === selectedKey ? " selected" : "");
    var dot = hasEvent ? '<span class="dot"></span>' : "";
    var click = hasEvent ? ' onclick="selectDate(\'' + key + '\')"' : "";
    html += '<div class="' + cls + '"' + click + '>' + d + dot + '</div>';
  }

  grid.innerHTML = html;
}

function selectDate(key){
  selectedKey = key;
  renderCalendar();
  renderDetail(key);
}

function renderDetail(key){
  var ev = events[key];
  var card = document.getElementById('detail-card');
  if (!ev) {
    card.innerHTML = '<p class="detail-empty">Select a highlighted date to view session details and register.</p>';
    return;
  }
  var descHtml = "";
  for (var i = 0; i < ev.description.length; i++) {
    var block = ev.description[i];
    if (block.indexOf("list:") === 0) {
      var items = block.substring(5).split("|");
      descHtml += "<ul>";
      for (var j = 0; j < items.length; j++) descHtml += "<li>" + items[j] + "</li>";
      descHtml += "</ul>";
    } else {
      descHtml += "<p>" + block + "</p>";
    }
  }

  var metaHtml = '<p class="detail-meta"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>' + (ev.past ? formatDate(key) : ev.time) + '</p>';

  var actionsHtml = '<div class="detail-actions">';
  if (ev.past) {
    actionsHtml += '<a class="detail-btn" href="' + ev.recordingLink + '" target="_blank" rel="noopener">View Recording</a>';
  } else {
    actionsHtml += '<a class="detail-btn" href="' + ev.link + '" target="_blank" rel="noopener">Register</a>';
    if (ev.startUTC) {
      actionsHtml += '<button type="button" class="detail-btn ghost" onclick="downloadICS(\'' + key + '\')">Add to Calendar</button>';
    }
    if (ev.mailto) {
      actionsHtml += '<a class="detail-btn ghost" href="' + ev.mailto + '">Email a topic idea</a>';
    }
  }
  actionsHtml += '</div>';

  card.innerHTML =
    '<p class="detail-title">' + ev.title + '</p>' +
    metaHtml +
    '<div class="detail-desc">' + descHtml + '</div>' +
    actionsHtml;
}

function shiftMonth(dir){
  viewMonth += dir;
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  renderCalendar();
  renderDetail(selectedKey);
}

renderDow();
renderCalendar();
</script>
</body>
</html>
