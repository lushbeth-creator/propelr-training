<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Propelr: Recordings Library</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:transparent;font-family:'Inter',sans-serif;color:#1a1a2e;padding:.5rem}

.rec-row{display:flex;flex-wrap:wrap;gap:10px}
.rec-btn{
  display:inline-flex;align-items:center;gap:9px;
  background:linear-gradient(to bottom,#ffffff 0%,#E8EDF8 100%);
  border:1px solid #A6B3D5;border-radius:14px;
  padding:.75rem 1.3rem;text-decoration:none;
  transition:box-shadow .15s,transform .15s;
}
.rec-btn:hover{box-shadow:0 3px 10px rgba(93,112,174,.15);transform:translateY(-1px)}
.rec-btn svg{width:16px;height:16px;flex-shrink:0;stroke:#59A398;stroke-width:1.9;fill:none;stroke-linecap:round;stroke-linejoin:round}
.rec-btn span{font-family:'Inter',sans-serif;font-weight:600;font-size:13.5px;color:#1B2F5B;white-space:nowrap}
</style>
</head>
<body>

<div class="rec-row">
  <a class="rec-btn" href="https://propelrpay1.sharepoint.com/sites/Employee-Portal/SitePages/Flight-School.aspx" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M10 8.5v7l6-3.5z"/></svg>
    <span>Flight School</span>
  </a>

  <a class="rec-btn" href="https://propelrpay1.sharepoint.com/sites/Training/SitePages/Leaning%20Lift-Off.aspx" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M10 8.5v7l6-3.5z"/></svg>
    <span>Learning Lift-Off</span>
  </a>
</div>

</body>
</html>
