<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Propelr: Customer Profile Worksheet Button</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#e8edf8;font-family:'Inter',sans-serif;color:#1a1a2e;padding:80px 20px;display:flex;justify-content:center}

.resource-item{position:relative;display:inline-flex}
.resource-pill{
  display:inline-flex;align-items:center;gap:8px;
  background:linear-gradient(to bottom,#ffffff 0%,#E8EDF8 100%);
  border:1px solid #A6B3D5;border-radius:14px;padding:.55rem .95rem;
  text-decoration:none;transition:box-shadow .15s,transform .15s;
}
.resource-pill:hover{box-shadow:0 3px 10px rgba(93,112,174,.15);transform:translateY(-1px)}
.resource-pill svg{width:16px;height:16px;flex-shrink:0;stroke:#59A398;stroke-width:1.9;fill:none;stroke-linecap:round;stroke-linejoin:round}
.resource-pill span{font-weight:600;font-size:13.5px;color:#1B2F5B;white-space:nowrap}

.resource-tooltip{
  position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%) translateY(6px);
  width:240px;background:#F3F6FF;border:1px solid #A6B3D5;border-radius:8px;padding:12px 14px;
  opacity:0;visibility:hidden;pointer-events:none;transition:opacity .15s ease, transform .15s ease;
  z-index:20;text-align:left;
}
.resource-item:hover .resource-tooltip{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0)}
.tooltip-title{font-weight:700;font-size:12.5px;color:#1B2F5B;margin-bottom:5px;line-height:1.4}
.tooltip-body{font-size:11.5px;color:#444;line-height:1.55}
</style>
</head>
<body>

<div class="resource-item">
  <a class="resource-pill" href="https://propelrpay1.sharepoint.com/sites/Training/Shared%20Documents/Forms/AllItems.aspx?id=%2Fsites%2FTraining%2FShared%20Documents%2FCustomer%20Profile%2Epdf&parent=%2Fsites%2FTraining%2FShared%20Documents&p=true&ga=1" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="3.5"/><path d="M5 20c1.5-4 4.5-6 7-6s5.5 2 7 6"/></svg>
    <span>Customer Profile Worksheet</span>
  </a>
  <div class="resource-tooltip">
    <div class="tooltip-title">Discovery Tool</div>
    <div class="tooltip-body">Capture merchant needs, concerns, and top priorities before every pitch you make in the field.</div>
  </div>
</div>

</body>
</html>
