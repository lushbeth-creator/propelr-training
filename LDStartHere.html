<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Propelr: New to Propelr</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:transparent;font-family:'Inter',sans-serif;color:#1a1a2e;padding:.5rem}

.outer{
  border-radius:14px;
  overflow:hidden;
  border:1px solid #59A398;
  background:linear-gradient(135deg,#ffffff 0%,#DAF3EF 100%);
}
.panel{padding:26px 30px;display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap}

.text h3{font-family:'Inter',sans-serif;font-weight:700;font-size:23px;color:#1B2F5B;margin-bottom:8px}
.text p{font-size:15.5px;color:#444;line-height:1.55;max-width:520px}

.actions{display:flex;flex-direction:column;gap:10px;flex-shrink:0}
.btn-primary{
  display:inline-flex;align-items:center;justify-content:center;background:#5D70AE;color:#fff;font-family:'Inter',sans-serif;
  font-weight:700;font-size:15px;padding:.85rem 1.5rem;border-radius:8px;text-decoration:none;
  white-space:nowrap;transition:background .15s;
}
.btn-primary:hover{background:#59A398}

@media (max-width:640px){
  .panel{flex-direction:column;align-items:flex-start}
  .actions{width:100%}
  .btn-primary{width:100%}
}
</style>
</head>
<body>

<div class="outer">
  <div class="panel">
    <div class="text">
      <h3>New to Propelr?</h3>
      <p>Start with Ground School to see what your first days of In-Flight Training look like.</p>
    </div>
    <div class="actions">
      <a class="btn-primary" href="https://propelrpay1.sharepoint.com/sites/Training/SitePages/In-Flight-Training.aspx" target="_blank" rel="noopener">Start Onboarding</a>
      <a class="btn-primary" href="mailto:blush@propelrpay.com?subject=New%20Hire%20Enrollment">Email Beth</a>
    </div>
  </div>
</div>

</body>
</html>
