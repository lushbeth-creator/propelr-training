<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Propelr — NER Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:transparent;font-family:'Inter',sans-serif;color:#1a1a2e;padding:.6rem .75rem;width:100%;position:relative}

/* Outer wrapper */
.outer-wrap{border:1px solid #d8dce8;border-radius:8px;overflow:hidden;background:linear-gradient(to bottom,#ffffff,#e8edf8);width:100%}

/* Header */
.calc-header{padding:.8rem 1.1rem;border-bottom:1px solid #d8dce8}
.calc-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:#59A398;display:flex;align-items:center;gap:.4rem}

/* Inputs */
.calc-body{padding:.9rem 1.1rem 1rem;border-bottom:1px solid #d8dce8}
.calc-row{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem}
.calc-row:last-child{margin-bottom:0}
.calc-row label{font-size:.82rem;color:#444;font-weight:500;min-width:175px}
.calc-row input{flex:1;height:34px;border:1.5px solid #d8dce8;border-radius:7px;padding:0 .7rem;font-family:'Inter',sans-serif;font-size:.85rem;color:#1a1a2e;background:#fff;transition:border-color .15s}
.calc-row input:focus{outline:none;border-color:#5D70AE}

/* Button */
.calc-action{padding:.75rem 1.1rem 1rem}
.calc-btn{display:inline-flex;align-items:center;gap:.4rem;background:#5D70AE;color:#fff;border:none;border-radius:7px;padding:.55rem 1.1rem;font-family:'Inter',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;transition:background .15s}
.calc-btn:hover{background:#4a5d9a}
.calc-btn:disabled{opacity:.4;cursor:default}

/* Modal */
.modal-overlay{display:none;position:absolute;inset:0;background:rgba(26,26,46,.45);z-index:100;align-items:center;justify-content:center;padding:1rem;cursor:pointer}
.modal-overlay.show{display:flex;animation:fadeIn .2s ease}
.modal{background:linear-gradient(to bottom,#ffffff,#e8edf8);border:1px solid #d8dce8;border-radius:8px;overflow:hidden;width:100%;max-width:420px;box-shadow:0 8px 32px rgba(0,0,0,.15);cursor:default}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:.75rem 1rem;border-bottom:1px solid #d8dce8}
.modal-eyebrow{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:#59A398}
.modal-close{background:none;border:none;font-size:1.1rem;color:#59A398;cursor:pointer;line-height:1;padding:0 2px;font-weight:400;transition:color .15s,font-weight .15s}
.modal-close:hover{color:#5D70AE;font-weight:700}
.modal-body{padding:1rem 1.1rem 1.2rem}
.modal-val{font-size:1.5rem;font-weight:700;color:#1a1a2e;margin-bottom:.2rem}
.modal-formula{font-size:.72rem;color:#999;margin-bottom:.6rem}
.modal-rule{height:1px;background:#d8dce8;margin:.65rem 0}
.modal-verdict{display:inline-block;font-size:.76rem;font-weight:700;padding:.28rem .65rem;border-radius:5px;margin-bottom:.55rem}
.v-good{background:#e6fbf7;color:#1a6b5c}
.v-ok{background:#fff9e6;color:#7a5500}
.v-high{background:#fdecea;color:#9b2020}
.modal-note{font-size:.8rem;color:#444;line-height:1.6}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>

<div class="outer-wrap">
  <div class="calc-header">
    <p class="calc-title">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#59A398" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="12" y2="14"/></svg>
      Net Effective Rate Calculator
    </p>
  </div>
  <div class="calc-body">
    <div class="calc-row">
      <label for="fees">Total fees charged ($)</label>
      <input type="number" id="fees" placeholder="e.g. 1250" oninput="checkReady()">
    </div>
    <div class="calc-row">
      <label for="vol">Total amount submitted ($)</label>
      <input type="number" id="vol" placeholder="e.g. 65000" oninput="checkReady()">
    </div>
  </div>
  <div class="calc-action">
    <button class="calc-btn" id="calc-btn" onclick="calcNER()" disabled>Calculate NER</button>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-eyebrow">Net Effective Rate</span>
      <button class="modal-close" onclick="closeModal()">&#x2715;</button>
    </div>
    <div class="modal-body">
      <p class="modal-val" id="modal-val">—</p>
      <p class="modal-formula" id="modal-formula"></p>
      <div class="modal-rule"></div>
      <div class="modal-verdict" id="modal-verdict"></div>
      <p class="modal-note" id="modal-note"></p>
    </div>
  </div>
</div>

<script>
function checkReady() {
  var f = parseFloat(document.getElementById('fees').value);
  var v = parseFloat(document.getElementById('vol').value);
  document.getElementById('calc-btn').disabled = !(f > 0 && v > 0);
}

function calcNER() {
  var f = parseFloat(document.getElementById('fees').value);
  var v = parseFloat(document.getElementById('vol').value);
  if (!f || !v) return;
  var ner = (f / v) * 100;

  document.getElementById('modal-val').textContent = ner.toFixed(2) + '% NER';
  document.getElementById('modal-formula').textContent = '$' + f.toLocaleString() + ' / $' + v.toLocaleString() + ' = ' + ner.toFixed(4);

  var verd = document.getElementById('modal-verdict');
  var note = document.getElementById('modal-note');
  if (ner < 2) {
    verd.className = 'modal-verdict v-good';
    verd.textContent = 'Competitive';
    note.textContent = 'Under 2% — solid. Lead with transparency and long-term relationship value.';
  } else if (ner <= 2.5) {
    verd.className = 'modal-verdict v-ok';
    verd.textContent = 'Improvable';
    note.textContent = '2–2.5% — there\'s room to optimize. Ask for an itemized IC+ statement to find where costs are hiding.';
  } else {
    verd.className = 'modal-verdict v-high';
    verd.textContent = 'Strong candidate';
    note.textContent = 'Over 2.5% — a cost-offset conversation (dual pricing or surcharge) is worth having. Run a side-by-side proposal.';
  }

  document.getElementById('modal-overlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
}
</script>
</body>
</html>
