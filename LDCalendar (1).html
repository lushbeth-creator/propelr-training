<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Propelr: Live Sessions</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:transparent;font-family:'Inter',sans-serif;color:#444;padding:.5rem;position:relative}

.outer{border:1px solid #d8dce8;border-radius:8px;overflow:hidden;background:linear-gradient(to bottom,#ffffff 0%,#e8edf8 100%)}
.panel{padding:22px 24px}

.eyebrow{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#59A398;margin-bottom:6px}
.ptitle{font-size:20px;font-weight:700;color:#1B2F5B;margin-bottom:10px}
.pbody{font-size:12.5px;color:#444;line-height:1.6;margin-bottom:18px}

.sessions-layout{display:grid;grid-template-columns:1fr 300px;gap:20px}

/* Next session card */
.next-card{background:#F3F6FF;border:1px solid #A6B3D5;border-radius:8px;padding:20px 22px}
.next-card .eyebrow{margin-bottom:6px}
.next-card .title{font-size:18px;font-weight:700;color:#1B2F5B;text-wrap:balance}
.next-card .datetime{font-size:13px;color:#5D70AE;font-weight:600;margin-top:6px}
.next-card .teaser{font-size:13px;color:#444;margin-top:12px}
.next-card .actions{margin-top:16px;display:flex;gap:10px;flex-wrap:wrap}

.btn-primary{background:#5D70AE;color:#fff;font-size:12.5px;font-weight:600;border:none;padding:10px 18px;border-radius:6px;cursor:pointer;text-decoration:none;display:inline-block}
.btn-primary:hover{background:#59A398}
.btn-ghost{background:transparent;color:#5D70AE;font-size:12.5px;font-weight:600;border:1px solid #A6B3D5;padding:10px 18px;border-radius:6px;cursor:pointer}
.btn-ghost:hover{border-color:#5D70AE}

/* Calendar */
.calendar-card{background:#F3F6FF;border:1px solid #A6B3D5;border-radius:8px;padding:16px}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-month{font-size:13px;font-weight:700;color:#1B2F5B}
.cal-nav{display:flex;gap:4px}
.cal-nav button{width:24px;height:24px;border:1px solid #A6B3D5;background:#ffffff;border-radius:4px;color:#5D70AE;font-weight:700;cursor:pointer;font-size:12px}
.cal-nav button:hover{border-color:#5D70AE}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dow{font-size:10px;font-weight:700;color:#A6B3D5;text-align:center;padding-bottom:4px}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:11.5px;color:#444;border-radius:5px;position:relative}
.cal-day.empty{visibility:hidden}
.cal-day.has-session{background:#ffffff;color:#1B2F5B;font-weight:700;cursor:pointer;border:1px solid #A6B3D5}
.cal-day.has-session:hover{background:#5D70AE;color:#fff;border-color:#5D70AE}
.cal-day.pending{background:transparent;color:#A6B3D5;font-weight:600;cursor:pointer;border:1px dashed #A6B3D5}
.cal-legend{margin-top:12px;display:flex;flex-direction:column;gap:6px;font-size:11px;color:#444}
.cal-legend-item{display:flex;align-items:center;gap:6px}
.cal-legend-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}

/* Modal */
.modal-overlay{display:none;position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(27,47,91,.55);align-items:flex-start;justify-content:center;padding:60px 20px;z-index:50}
.modal-overlay.open{display:flex}
.modal-card{background:linear-gradient(to bottom,#ffffff 0%,#e8edf8 100%);border:1px solid #d8dce8;border-radius:8px;max-width:480px;width:100%;padding:26px 28px;position:relative}
.modal-close{position:absolute;top:14px;right:14px;width:26px;height:26px;border-radius:50%;border:none;background:transparent;color:#59A398;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-close:hover{color:#5D70AE}
.modal-eyebrow{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#59A398;margin-bottom:6px}
.modal-title{font-size:19px;font-weight:700;color:#1B2F5B;padding-right:20px;text-wrap:balance}
.modal-datetime{font-size:13px;font-weight:600;color:#5D70AE;margin-top:6px}
.modal-body{font-size:13px;color:#444;margin-top:14px}
.modal-body p{margin-bottom:10px}
.modal-body ul{margin:10px 0 10px 18px}
.modal-body li{margin-bottom:5px}
.modal-actions{margin-top:18px;display:flex;gap:10px;flex-wrap:wrap}
.modal-pending-note{background:#F3F6FF;border:1px solid #A6B3D5;border-radius:6px;padding:12px 14px;font-size:12.5px;color:#444;margin-top:12px}

@media (max-width:640px){.sessions-layout{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="outer">
  <div class="panel">
    <p class="eyebrow">Training</p>
    <p class="ptitle">Live Sessions</p>
    <p class="pbody">All Pilots are automatically enrolled in Learning Lift-Off. Pick a highlighted date on the calendar to see session details and register.</p>

    <div class="sessions-layout">
      <div class="next-card">
        <div class="eyebrow">Next Session</div>
        <div class="title" id="next-title">Loading</div>
        <div class="datetime" id="next-datetime"></div>
        <div class="teaser" id="next-teaser"></div>
        <div class="actions">
          <a class="btn-primary" id="next-register" href="#" target="_blank" rel="noopener">Register</a>
          <button class="btn-ghost" id="next-ics">Add to Calendar</button>
        </div>
      </div>

      <div class="calendar-card">
        <div class="cal-header">
          <div class="cal-month" id="cal-month-label"></div>
          <div class="cal-nav">
            <button id="cal-prev" aria-label="Previous month">&lsaquo;</button>
            <button id="cal-next" aria-label="Next month">&rsaquo;</button>
          </div>
        </div>
        <div class="cal-grid" id="cal-dow-row"></div>
        <div class="cal-grid" id="cal-days"></div>
        <div class="cal-legend">
          <div class="cal-legend-item"><span class="cal-legend-dot" style="background:#ffffff;border:1px solid #A6B3D5;"></span>Session scheduled</div>
          <div class="cal-legend-item"><span class="cal-legend-dot" style="background:transparent;border:1px dashed #A6B3D5;"></span>Learning Lift-Off, details soon</div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal-card">
    <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
    <div class="modal-eyebrow">Learning Lift-Off</div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-datetime" id="modal-datetime"></div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>

<script>
  var sessions = {
    "2026-07-14": {
      title: "Learning Lift-Off: Equipment Financing",
      time: "3:00 PM EST",
      teaser: "A guided walkthrough of all seven Propelr equipment financing structures and how to pitch the right one.",
      bodyHtml:
        "<p>Equipment financing is one of the most powerful tools in your sales toolkit, and one of the easiest to get wrong if you do not know the rules. Propelr offers seven different financing structures, and this session is your guided walkthrough of all of them.</p>" +
        "<p>We will help you get clear on:</p>" +
        "<ul>" +
          "<li>Which option fits the deal in front of you, and how to pitch it</li>" +
          "<li>What your liability actually looks like under each structure. It varies a lot.</li>" +
          "<li>What documentation is required before equipment ever ships</li>" +
          "<li>How the CFO approval process works for pilot-facing financing options</li>" +
          "<li>What is new with equipment onboarding in Stratus, and where to go for the full details</li>" +
        "</ul>" +
        "<p>This session is designed to get you oriented. The Employee Portal has the full reference material, and we will point you to exactly where to find it.</p>",
      link: "https://events.teams.microsoft.com/event/a905c646-974b-49bc-a4c9-b4eaf0b9b1c5@db4bb98e-b39f-4bfd-b3e3-e0b809d1bb6a"
    }
  };

  function thirdTuesday(year, month) {
    var d = new Date(year, month, 1);
    var day = d.getDay();
    var offset = (2 - day + 7) % 7;
    var firstTuesday = 1 + offset;
    var third = firstTuesday + 14;
    return new Date(year, month, third);
  }
  function dateKey(d) {
    return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
  }
  function formatLong(d) {
    var days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    var months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    return days[d.getDay()] + ", " + months[d.getMonth()] + " " + d.getDate();
  }
  function icsTimestamp(d) {
    return d.getUTCFullYear() + String(d.getUTCMonth() + 1).padStart(2, "0") + String(d.getUTCDate()).padStart(2, "0")
      + "T" + String(d.getUTCHours()).padStart(2, "0") + String(d.getUTCMinutes()).padStart(2, "0") + "00Z";
  }
  function stripHtml(html) {
    var tmp = document.createElement("div");
    tmp.innerHTML = html.replace(/<\/p>|<\/li>/g, "\n").replace(/<[^>]+>/g, "");
    return tmp.textContent.replace(/\n{2,}/g, "\n").trim();
  }
  function downloadIcs(key, s) {
    var start = new Date(key + "T15:00:00-05:00");
    var end = new Date(start.getTime() + 60 * 60 * 1000);
    var desc = stripHtml(s.bodyHtml).replace(/\n/g, "\\n") + "\\n\\nRegister: " + s.link;
    var lines = [
      "BEGIN:VCALENDAR",
      "VERSION:2.0",
      "PRODID:-//Propelr L&D//Learning Lift-Off//EN",
      "BEGIN:VEVENT",
      "UID:" + key + "-liftoff@propelrpay.com",
      "DTSTAMP:" + icsTimestamp(new Date()),
      "DTSTART:" + icsTimestamp(start),
      "DTEND:" + icsTimestamp(end),
      "SUMMARY:" + s.title,
      "DESCRIPTION:" + desc,
      "LOCATION:" + s.link,
      "END:VEVENT",
      "END:VCALENDAR"
    ];
    var blob = new Blob([lines.join("\r\n")], { type: "text/calendar" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "learning-liftoff-" + key + ".ics";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  var viewYear = 2026, viewMonth = 6;

  function renderNextSession() {
    var keys = Object.keys(sessions).sort();
    var upcoming = keys.find(function(k) { return new Date(k + "T23:59:59") >= new Date(); }) || keys[keys.length - 1];
    var s = sessions[upcoming];
    var d = new Date(upcoming + "T00:00:00");
    document.getElementById("next-title").textContent = s.title;
    document.getElementById("next-datetime").textContent = formatLong(d) + " \u00b7 " + s.time;
    document.getElementById("next-teaser").textContent = s.teaser;
    document.getElementById("next-register").href = s.link;
    document.getElementById("next-ics").onclick = function() { downloadIcs(upcoming, s); };
  }

  function renderCalendar() {
    var monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    document.getElementById("cal-month-label").textContent = monthNames[viewMonth] + " " + viewYear;

    var dowRow = document.getElementById("cal-dow-row");
    dowRow.innerHTML = "";
    ["S","M","T","W","T","F","S"].forEach(function(d) {
      var el = document.createElement("div");
      el.className = "cal-dow";
      el.textContent = d;
      dowRow.appendChild(el);
    });

    var grid = document.getElementById("cal-days");
    grid.innerHTML = "";
    var firstDay = new Date(viewYear, viewMonth, 1).getDay();
    var daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
    var liftoff = thirdTuesday(viewYear, viewMonth);
    var liftoffKey = dateKey(liftoff);

    for (var i = 0; i < firstDay; i++) {
      var empty = document.createElement("div");
      empty.className = "cal-day empty";
      grid.appendChild(empty);
    }
    for (var day = 1; day <= daysInMonth; day++) {
      var cell = document.createElement("div");
      cell.className = "cal-day";
      cell.textContent = day;
      var key = viewYear + "-" + String(viewMonth + 1).padStart(2, "0") + "-" + String(day).padStart(2, "0");
      if (key === liftoffKey) {
        if (sessions[key]) {
          cell.className = "cal-day has-session";
          cell.onclick = (function(k) { return function() { openModal(k); }; })(key);
        } else {
          cell.className = "cal-day pending";
          cell.onclick = (function(k) { return function() { openPending(k); }; })(key);
        }
      }
      grid.appendChild(cell);
    }
  }

  function openModal(key) {
    var s = sessions[key];
    var d = new Date(key + "T00:00:00");
    document.getElementById("modal-title").textContent = s.title;
    document.getElementById("modal-datetime").textContent = formatLong(d) + " \u00b7 " + s.time;
    document.getElementById("modal-body").innerHTML = s.bodyHtml;
    document.getElementById("modal-actions").innerHTML =
      '<a class="btn-primary" href="' + s.link + '" target="_blank" rel="noopener">Register</a> ' +
      '<button class="btn-ghost" id="modal-ics">Add to Calendar</button>';
    document.getElementById("modal-overlay").classList.add("open");
    document.getElementById("modal-ics").onclick = function() { downloadIcs(key, s); };
  }

  function openPending(key) {
    var d = new Date(key + "T00:00:00");
    document.getElementById("modal-title").textContent = "Learning Lift-Off";
    document.getElementById("modal-datetime").textContent = formatLong(d) + " \u00b7 3:00 PM EST";
    document.getElementById("modal-body").innerHTML = '<div class="modal-pending-note">Topic and registration link for this session have not been posted yet. Check back closer to the date, or watch for the calendar invite.</div>';
    document.getElementById("modal-actions").innerHTML = "";
    document.getElementById("modal-overlay").classList.add("open");
  }

  document.getElementById("modal-close").onclick = function() {
    document.getElementById("modal-overlay").classList.remove("open");
  };
  document.getElementById("modal-overlay").addEventListener("click", function(e) {
    if (e.target === this) this.classList.remove("open");
  });
  document.getElementById("cal-prev").onclick = function() {
    viewMonth--;
    if (viewMonth < 0) { viewMonth = 11; viewYear--; }
    renderCalendar();
  };
  document.getElementById("cal-next").onclick = function() {
    viewMonth++;
    if (viewMonth > 11) { viewMonth = 0; viewYear++; }
    renderCalendar();
  };

  renderNextSession();
  renderCalendar();
</script>
</body>
</html>
