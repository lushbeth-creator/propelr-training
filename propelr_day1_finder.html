<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Propelr — Find the Right Fit</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: transparent;
    font-family: 'Inter', sans-serif;
    color: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 1.2rem 1rem;
  }

  .container {
    width: 100%;
    max-width: 520px;
  }

  /* Header — hidden */
  .header {
    display: none;
  }
  .header p {
    font-size: .875rem;
    color: #666;
    line-height: 1.55;
  }

  /* Card */
  .card {
    background: transparent;
    border: 1.5px solid #e0e6ff;
    border-radius: 12px;
    padding: 1.8rem;
    box-shadow: 0 2px 12px rgba(93,112,174,0.07);
  }

  /* Progress */
  .progress-wrap {
    display: flex;

    gap: .75rem;
    margin-bottom: 1.6rem;
  }
  .progress-track {
    flex: 1;
    height: 4px;
    background: #eef0f8;
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #59A398, #5D70AE);
    border-radius: 4px;
    transition: width .4s ease;
  }
  .progress-label {
    font-size: .72rem;
    font-weight: 600;
    color: #999;
    white-space: nowrap;
  }

  /* Question */
  .question-label {
    font-size: .7rem;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: #5D70AE;
    margin-bottom: .5rem;
  }
  .question-text {
    font-size: 1.05rem;
    font-weight: 600;
    color: #1a1a2e;
    margin-bottom: 1.2rem;
    line-height: 1.4;
  }

  /* Options */
  .options {
    display: flex;
    flex-direction: column;
    gap: .5rem;
    margin-bottom: 1rem;
  }
  .opt {
    display: flex;

    gap: .75rem;
    background: transparent;
    border: 1.5px solid #d8dff0;
    border-radius: 8px;
    padding: .75rem 1rem;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    text-align: left;
    font-family: 'Inter', sans-serif;
    font-size: .875rem;
    font-weight: 500;
    color: #333;
    width: 100%;
  }
  .opt:hover {
    border-color: #5D70AE;
    background: #f3f6ff;
    color: #1a1a2e;
  }
  .opt:focus {
    outline: 2px solid #5D70AE;
    outline-offset: 2px;
  }
  .opt-dot {
    width: 18px;
    height: 18px;
    border: 2px solid #d0d8f0;
    border-radius: 50%;
    flex-shrink: 0;
    transition: border-color .15s, background .15s;
  }
  .opt:hover .opt-dot {
    border-color: #5D70AE;
  }

  /* Back button */
  .back-btn {
    background: none;
    border: none;
    font-family: 'Inter', sans-serif;
    font-size: .8rem;
    color: #999;
    cursor: pointer;
    padding: 0;
    display: flex;

    gap: .3rem;
    transition: color .15s;
    margin-top: .25rem;
  }
  .back-btn:hover { color: #5D70AE; }

  /* Result */
  .result { animation: fadeUp .3s ease; }
  .result-rec-label {
    font-size: .7rem;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: #59A398;
    margin-bottom: .35rem;
  }
  .result-name {
    font-size: 1.5rem;
    font-weight: 700;
    color: #1a1a2e;
    margin-bottom: .6rem;
  }
  .result-divider {
    height: 2px;
    background: #DAF3EF;
    border-radius: 2px;
    margin-bottom: .9rem;
  }
  .result-why {
    font-size: .875rem;
    color: #444;
    line-height: 1.65;
    margin-bottom: .9rem;
  }
  .result-tags {
    display: flex;
    flex-wrap: wrap;
    gap: .35rem;
    margin-bottom: 1.1rem;
  }
  .rtag {
    font-size: .72rem;
    font-weight: 600;
    padding: .22rem .6rem;
    border-radius: 4px;
    background: #f3f6ff;
    color: #5D70AE;
    border: 1px solid #A6B3D5;
  }
  .result-qs-label {
    font-size: .72rem;
    font-weight: 700;
    letter-spacing: .09em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: .5rem;
  }
  .result-qs {
    list-style: none;
    padding: 0;
    margin-bottom: 1.3rem;
  }
  .result-qs li {
    font-size: .855rem;
    color: #444;
    padding: .3rem 0 .3rem .9rem;
    position: relative;
    line-height: 1.5;
    border-bottom: 1px solid #f5f5f5;
  }
  .result-qs li:last-child { border-bottom: none; }
  .result-qs li::before {
    content: "›";
    position: absolute;
    left: 0;
    color: #59A398;
    font-weight: 700;
  }

  /* Buttons row */
  .btn-row {
    display: flex;
    gap: .6rem;
    flex-wrap: wrap;
  }
  .btn-primary {
    background: #59A398;
    color: #fff;
    border: none;
    border-radius: 7px;
    padding: .6rem 1.2rem;
    font-family: 'Inter', sans-serif;
    font-size: .835rem;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s;
  }
  .btn-primary:hover { background: #4a8f85; }
  .btn-outline {
    background: transparent;
    color: #5D70AE;
    border: 1.5px solid #d0d8f0;
    border-radius: 7px;
    padding: .6rem 1.2rem;
    font-family: 'Inter', sans-serif;
    font-size: .835rem;
    font-weight: 600;
    cursor: pointer;
    transition: border-color .15s, color .15s;
  }
  .btn-outline:hover { border-color: #5D70AE; }

  /* Welcome screen */
  .welcome { text-align: center; }
  .welcome-icon {
    width: 52px;
    height: 52px;
    background: #f3f6ff;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.1rem;
  }
  .welcome-icon svg { width: 28px; height: 28px; }
  .welcome h2 {
    font-size: 1.25rem;
    font-weight: 700;
    font-family: 'Qualy Neue', 'Inter', sans-serif;
    color: #5D70AE;
    margin-bottom: .5rem;
  }
  .welcome p {
    font-size: .875rem;
    color: #666;
    line-height: 1.6;
    margin-bottom: 1.4rem;
    max-width: 340px;
    margin-left: auto;
    margin-right: auto;
  }
  .welcome-steps {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    gap: .5rem;
    margin-bottom: 1.6rem;
  }
  .welcome-step {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: .4rem;
    flex: 1;
    max-width: 90px;
  }
  .step-num {
    width: 32px;
    height: 32px;
    background: #DAF3EF;
    color: #59A398;
    border-radius: 50%;
    font-size: .8rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .step-label {
    font-size: .72rem;
    color: #888;
    font-weight: 500;
    text-align: center;
    max-width: 70px;
    line-height: 1.3;
  }
  .step-connector {
    width: 24px;
    height: 2px;
    background: #e0e6ff;
    align-self: flex-start;
    margin-top: 15px;
    flex-shrink: 0;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    .card { padding: 1.3rem; }
    .result-name { font-size: 1.25rem; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <p class="header-eyebrow">In-Flight Training · Day 1</p>
    <h1>Find the Right Fit</h1>
    <p>Answer 3 questions about your merchant and get an instant product recommendation.</p>
  </div>

  <div class="card" id="card">
    <!-- Content injected by JS -->
  </div>
</div>

<script>
var steps = [
  {
    q: "What type of business is your merchant?",
    opts: [
      { l: "Retail / Boutique",         v: "retail"      },
      { l: "Restaurant / QSR",           v: "restaurant"  },
      { l: "Professional Services",      v: "pro"         },
      { l: "Healthcare",                 v: "health"      },
      { l: "Field Service / Mobile",     v: "field"       },
      { l: "E-Commerce / Online",        v: "ecom"        }
    ]
  },
  {
    q: "How do they feel about card fees?",
    opts: [
      { l: "Want to offset or eliminate fees",        v: "offset"      },
      { l: "Prefer full transparency on rates",       v: "transparent" },
      { l: "Haven't asked — just want the best rate", v: "rate"        }
    ]
  },
  {
    q: "How important is software and ecosystem?",
    opts: [
      { l: "Needs robust POS and apps (inventory, loyalty, etc.)", v: "robust"   },
      { l: "Simple is better — plug and play",                     v: "simple"   },
      { l: "Already has software — just needs payments",           v: "gateway"  }
    ]
  }
];

var recs = {
  restaurant: { offset: "Valor PayTech", transparent: "Clover",      rate: "Clover",          robust: "Clover",          simple: "Valor PayTech", gateway: "CardPointe" },
  retail:     { offset: "Valor PayTech", transparent: "Square",      rate: "Square",          robust: "Clover",          simple: "Square",        gateway: "CardPointe" },
  pro:        { offset: "Valor PayTech", transparent: "CardPointe",  rate: "CardPointe",      robust: "CardPointe",      simple: "CardPointe",    gateway: "CardPointe" },
  health:     { offset: "Valor PayTech", transparent: "Rectangle Health", rate: "Rectangle Health", robust: "Rectangle Health", simple: "CardPointe", gateway: "CardPointe" },
  field:      { offset: "SwipeSimple",   transparent: "SwipeSimple", rate: "SwipeSimple",     robust: "SwipeSimple",     simple: "SwipeSimple",   gateway: "SwipeSimple" },
  ecom:       { offset: "CardPointe",    transparent: "CardPointe",  rate: "CardPointe",      robust: "CardPointe",      simple: "CardPointe",    gateway: "CardPointe"  }
};

var details = {
  "Valor PayTech":      { why: "Built from the ground up for cash discount and surcharge programs. Offsets up to 100% of processing fees. Ideal when the merchant is open to passing fees to customers.", tags: ["Dual Pricing","Surcharge","Multi-location"], qs: ["Would you be open to passing fees to customers?","Do you run a cash discount program today?","Do you have multiple locations or field staff?"] },
  "Clover":             { why: "The go-to for restaurants and retailers who need a real POS ecosystem — inventory, loyalty, tableside ordering, and 425+ apps. Strong hardware story.", tags: ["Restaurant","Retail","App Marketplace"], qs: ["Do you manage inventory or run a restaurant?","Would tableside ordering or kiosk help?","Would connecting to DoorDash or QuickBooks add value?"] },
  "CardPointe":         { why: "Best when the merchant needs a gateway, virtual terminal, or B2B optimization — and doesn't need to replace an existing POS. PCI-Validated, same-day virtual terminal.", tags: ["Gateway","B2B","E-Commerce","IC+"], qs: ["Do you need invoicing or online payments?","Do you process B2B or recurring billing?","Are you looking for PCI compliance tools?"] },
  "Square":             { why: "Easiest onboarding for smaller merchants who want one tool for payments, online store, payroll, and capital. Through Propelr, they get white-glove support they can't get direct.", tags: ["SMB","Self-Service","Flat Rate"], qs: ["Are you open to a flat-rate model?","Do you want online store and payments in one place?","Have you used Square before?"] },
  "SwipeSimple":        { why: "Purpose-built for mobile and field service. Dual pricing capable. A920 Pro and A80 hardware options. Simple, agent-friendly reporting portal.", tags: ["Mobile","Field Service","Dual Pricing"], qs: ["Do you take payments in the field or at job sites?","Do you need a card reader that works on a phone or tablet?","Would you consider passing fees to customers?"] },
  "Rectangle Health":   { why: "Referral product built for healthcare — HIPAA/OSHA compliant, patient payment plans, and practice management integration. Hand off to the referral team.", tags: ["Healthcare","Referral","Compliance"], qs: ["Do you have a practice management system today?","Are you looking for patient financing options?","Are you currently PCI compliant?"] }
};

var answers = [];
var screen = "welcome";

function render() {
  var card = document.getElementById("card");
  if (screen === "welcome") { renderWelcome(card); return; }
  if (screen === "result")  { renderResult(card);  return; }
  renderQuestion(card);
}

function renderWelcome(card) {
  card.innerHTML =
    '<div class="welcome">' +
      '<div class="welcome-icon">' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="#5D70AE" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>' +
      '</div>' +
      '<h2>Find the Right Fit</h2>' +
      '<p>Three quick questions about your merchant. You\'ll get a product recommendation plus the discovery questions to confirm it in the field.</p>' +
      '<div class="welcome-steps">' +
        '<div class="welcome-step"><div class="step-num">1</div><div class="step-label">Business type</div></div>' +
        '<div class="step-connector"></div>' +
        '<div class="welcome-step"><div class="step-num">2</div><div class="step-label">Fee attitude</div></div>' +
        '<div class="step-connector"></div>' +
        '<div class="welcome-step"><div class="step-num">3</div><div class="step-label">Software needs</div></div>' +
      '</div>' +
      '<button class="btn-primary" onclick="startFinder()" style="width:100%;padding:.75rem;font-size:.9rem;">Get Started</button>' +
    '</div>';
}

function renderQuestion(card) {
  var idx = answers.length;
  var step = steps[idx];
  var pct = Math.round((idx / steps.length) * 100);

  var opts = step.opts.map(function(o) {
    return '<button class="opt" onclick="pick(\'' + o.v + '\')">' +
             '<span class="opt-dot"></span>' + o.l +
           '</button>';
  }).join('');

  card.innerHTML =
    '<div class="progress-wrap">' +
      '<div class="progress-track"><div class="progress-fill" style="width:' + pct + '%"></div></div>' +
      '<span class="progress-label">Question ' + (idx+1) + ' of ' + steps.length + '</span>' +
    '</div>' +
    '<p class="question-label">Question ' + (idx+1) + '</p>' +
    '<p class="question-text">' + step.q + '</p>' +
    '<div class="options">' + opts + '</div>' +
    (idx > 0 ? '<button class="back-btn" onclick="goBack()">&#8592; Back</button>' : '');
}

function renderResult(card) {
  var vertical = answers[0];
  var fees     = answers[1];
  var eco      = answers[2];
  var name     = (recs[vertical] && recs[vertical][eco]) ? recs[vertical][eco] : (recs[vertical] ? recs[vertical][fees] : "CardPointe");
  var d        = details[name] || { why: "Good general fit for this merchant profile.", tags: [], qs: [] };

  var tags = d.tags.map(function(t) { return '<span class="rtag">' + t + '</span>'; }).join('');
  var qs   = d.qs.map(function(q)   { return '<li>' + q + '</li>'; }).join('');

  card.innerHTML =
    '<div class="result">' +
      '<div class="progress-wrap">' +
        '<div class="progress-track"><div class="progress-fill" style="width:100%"></div></div>' +
        '<span class="progress-label">Complete</span>' +
      '</div>' +
      '<p class="result-rec-label">Recommended Solution</p>' +
      '<p class="result-name">' + name + '</p>' +
      '<div class="result-divider"></div>' +
      '<p class="result-why">' + d.why + '</p>' +
      '<div class="result-tags">' + tags + '</div>' +
      (qs ? '<p class="result-qs-label">Discovery questions to confirm</p><ul class="result-qs">' + qs + '</ul>' : '') +
      '<div class="btn-row">' +
        '<button class="btn-primary" onclick="reset()">Start Over</button>' +
        '<button class="btn-outline" onclick="goBack()">&#8592; Change last answer</button>' +
      '</div>' +
    '</div>';
}

function startFinder() { screen = "question"; render(); }
function pick(v)        { answers.push(v); if (answers.length >= steps.length) { screen = "result"; } render(); }
function goBack()       { if (screen === "result") { screen = "question"; } answers.pop(); if (answers.length === 0) { screen = "welcome"; } render(); }
function reset()        { answers = []; screen = "welcome"; render(); }

render();
</script>
</body>
</html>
