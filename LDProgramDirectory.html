<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Propelr: Program Directory</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:transparent;font-family:'Inter',sans-serif;color:#1a1a2e;padding:.5rem}

.prog-table{border:1px solid #A6B3D5;border-radius:8px;overflow:hidden}
.prog-row{display:grid;grid-template-columns:1.2fr 1fr 1.8fr;gap:14px;padding:14px 18px 14px 16px;font-size:13px;align-items:center;border-left:4px solid #59A398;background:#F3F6FF}
.prog-row:not(.head):not(:last-child){border-bottom:1px solid #E8EDF8}
.prog-row.head{background:#1B2F5B;color:#fff;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.05em;border-left:4px solid #1B2F5B}
.prog-name{font-weight:700}
.prog-row.head .prog-name{color:#fff}
.prog-row:not(.head) .prog-name a{color:#59A398;text-decoration:none}
.prog-row:not(.head) .prog-name a:hover{color:#5D70AE;text-decoration:underline}
.prog-cadence{color:#555}
.prog-desc{color:#444;line-height:1.4}
</style>
</head>
<body>

<div class="prog-table">
  <div class="prog-row head">
    <span>Program</span>
    <span>Cadence</span>
    <span>What it is</span>
  </div>
  <div class="prog-row">
    <span class="prog-name"><a href="https://propelrpay1.sharepoint.com/sites/Training/SitePages/Leaning%20Lift-Off.aspx" target="_blank" rel="noopener">Learning Lift-Off</a></span>
    <span class="prog-cadence">Monthly, 3rd Tuesday</span>
    <span class="prog-desc">Live webinar deep dive on one topic, hosted for the full team</span>
  </div>
  <div class="prog-row">
    <span class="prog-name"><a href="https://propelrpay1.sharepoint.com/sites/Employee-Portal/SitePages/Flight-School.aspx" target="_blank" rel="noopener">Flight School</a></span>
    <span class="prog-cadence">As scheduled</span>
    <span class="prog-desc">Product and partner deep dive sessions</span>
  </div>
  <div class="prog-row">
    <span class="prog-name"><a href="https://propelrpay1.sharepoint.com/sites/Training/SitePages/In-Flight-Training.aspx" target="_blank" rel="noopener">In-Flight Training</a></span>
    <span class="prog-cadence">New hire onboarding</span>
    <span class="prog-desc">3-day Pilot onboarding curriculum, Ground School homepage</span>
  </div>
</div>

</body>
</html>
